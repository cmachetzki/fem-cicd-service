# .github/workflows/deploy.yml — POC stage, end of segment 6
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build Astro
        uses: ./.github/actions/build-astro
      
  deploy:
    environment: production
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
      - run: aws s3 sync dist/ s3://cmach-fem-cicd-service/ --delete
